<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="envelopeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#E0E7FF;stop-opacity:0.95" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#4F46E5" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bgGrad)" />
  <!-- Envelope body -->
  <rect x="10" y="20" width="44" height="28" rx="4" fill="url(#envelopeGrad)" filter="url(#shadow)" />
  <!-- Envelope flap V shape -->
  <polyline points="10,20 32,36 54,20" fill="none" stroke="#6366F1" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Left fold line -->
  <line x1="10" y1="48" x2="24" y2="34" stroke="#C7D2FE" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Right fold line -->
  <line x1="54" y1="48" x2="40" y2="34" stroke="#C7D2FE" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Green send dot -->
  <circle cx="48" cy="16" r="6" fill="#10B981" />
  <!-- Up arrow inside green dot -->
  <polyline points="45,17 48,13.5 51,17" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="48" y1="13.5" x2="48" y2="19" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
</svg>